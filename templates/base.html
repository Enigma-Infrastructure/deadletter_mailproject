{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}deadletter{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>
<body>
  <div class="app-shell">

    <header>
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
        <div>
          <a href="/" style="text-decoration:none; color:inherit;">
            <div style="font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; font-size: 0.9rem;">
              deadletter
            </div>
            <div style="font-size: 0.8rem; color: #666a75;">
              pirate mail for wandering letters
            </div>
          </a>
        </div>

        <nav style="display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: flex-end;">
          <!-- Primary: Read first -->
          <a class="btn btn-primary" href="/letters/read/">Read Letters</a>

          <!-- Secondary: Get a letter -->
          <a class="btn" href="/write/request/">Get a Letter</a>

          <!-- Tertiary: Write -->
          <a class="btn" href="/letters/write/queue/">Write a Letter</a>

          <!-- Carry flow -->
          <a class="btn" href="/carry/">Carry</a>

          <!-- Print helper -->
          <a class="btn" href="/letters/print/queue/">Print</a>

          <!-- Admin -->
          <a class="btn" href="/admin/">Admin</a>
        </nav>
      </div>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
