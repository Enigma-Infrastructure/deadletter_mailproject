{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}deadletter{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>
<body>
  <div class="app-shell">

    <header>
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
        <div>
          <div style="font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; font-size: 0.9rem;">
            deadletter
          </div>
          <div style="font-size: 0.8rem; color: #666a75;">
            pirate mail for wandering letters
          </div>
        </div>

        <nav style="display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: flex-end;">
          <!-- Reader / public-side -->
          <a class="btn" href="/letters/read/">Read letters</a>

          <!-- Writer flows -->
          <a class="btn" href="/letters/write/queue/">Write: queue</a>

          <!-- Carry flow -->
          <a class="btn" href="/carry/">Carry</a>

          <!-- Print helper: list / recent (adjust URL when you have it) -->
          <a class="btn" href="/letters/print/queue/">Print</a>

          <!-- Admin -->
          <a class="btn" href="/admin/">Admin</a>
        </nav>
      </div>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
