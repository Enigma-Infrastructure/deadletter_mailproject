{% extends "cyberpunk/desk_base.html" %}
{% block content %}
<div class="card" style="max-width:640px; margin:0 auto;">
  <h1>Write a letter</h1>
  <p class="text-muted">Topic: <strong>{{ concept.title }}</strong></p>
  <hr>

  <form method="post">
    {% csrf_token %}

    <div class="form-group">
      <label for="name_alias">Name / Alias</label>
      <input
        type="text"
        id="name_alias"
        name="name_alias"
        placeholder="Someone out there"
        value="Someone out there"
      >
    </div>

    <div class="form-group">
      <label for="id_body_text">Your message</label>
      {{ form.body_text }}
    </div>

    <hr>

    <div class="form-group">
      <label for="continued_email">Continued interest (optional email)</label>
      <input
        type="email"
        id="continued_email"
        name="continued_email"
        placeholder="you@example.org (optional)"
      >
      <p class="text-muted">
        This email is only for organizers to reach out later; it will not
        appear on the public reading page.
      </p>
    </div>

    <button type="submit" class="btn">Save</button>
  </form>
</div>
{% endblock %}
